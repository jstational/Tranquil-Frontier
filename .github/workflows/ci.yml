name: CI

on:
  push:
    branches: ['main']

jobs:
  build:
    name: build
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: cache-jdk
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      
      - name: build-with-gradle
        run: .\gradlew build

      - name: upload
        uses: actions/upload-artifact@v4
        with: 
          name: 'game8'
          path: build/libs/*.jar
  
